version: "3.9"

services:
  # ── Databases (one per service) ─────────────────────────────
  staff-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: staff_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  manager-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  customer-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  catalog-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"
    ports:
      - "5432:5432"

  book-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: book_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"
      

  cart-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  ship-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ship_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  pay-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pay_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  comment-rate-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: comment_rate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  comment-rate-mongo:
    image: mongo:7

  recommender-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: recommender_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  api-gateway-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"
  # ── Services ────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@api-gateway-db:5432/gateway_db
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      BOOK_SERVICE_URL: http://book-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      REVIEW_SERVICE_URL: http://comment-rate-service:8000
      RECOMMENDER_SERVICE_URL: http://recommender-ai-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      MANAGER_SERVICE_URL: http://manager-service:8000
      AUTH_SERVICE_URL: http://auth-service:8000
      REDIS_URL: redis://redis:6379/0
      JWT_AUTH_ENABLED: "${JWT_AUTH_ENABLED:-false}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      RATE_LIMIT: "${RATE_LIMIT:-100}"
      RATE_LIMIT_WINDOW: "${RATE_LIMIT_WINDOW:-60}"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3001,http://127.0.0.1:3001,http://35.175.245.212,http://35.175.245.212:3001,http://35.175.245.212:8080
    depends_on:
      - staff-service
      - manager-service
      - customer-service
      - catalog-service
      - book-service
      - cart-service
      - order-service
      - ship-service
      - pay-service
      - comment-rate-service
      - recommender-ai-service
      - api-gateway-db
      - redis
      - auth-service

  staff-service:
    build: ./staff-service
    ports:
      - "8093:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@staff-db:5432/staff_db
    depends_on:
      - staff-db

  manager-service:
    build: ./manager-service
    ports:
      - "8094:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@manager-db:5432/manager_db
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      BOOK_SERVICE_URL: http://book-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      REVIEW_SERVICE_URL: http://comment-rate-service:8000
    depends_on:
      - manager-db

  customer-service:
    build: ./customer-service
    ports:
      - "8083:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@customer-db:5432/customer_db
      CART_SERVICE_URL: http://cart-service:8000
    depends_on:
      - customer-db

  catalog-service:
    build: ./catalog-service
    ports:
      - "8084:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@catalog-db:5432/catalog_db
    depends_on:
      - catalog-db

  book-service:
    build: ./book-service
    ports:
      - "8085:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@book-db:5432/book_db
      CATALOG_SERVICE_URL: http://catalog-service:8000
      RABBITMQ_URL: amqp://bookstore:bookstore123@rabbitmq:5672/
    depends_on:
      - book-db
      - catalog-service

  book-worker:
    build: ./book-service
    command: python manage.py consume_order_confirmed
    environment:
      DATABASE_URL: postgres://postgres:2604@book-db:5432/book_db
      RABBITMQ_URL: amqp://bookstore:bookstore123@rabbitmq:5672/
    depends_on:
      - book-db
      - rabbitmq

  cart-service:
    build: ./cart-service
    ports:
      - "8086:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@cart-db:5432/cart_db
      BOOK_SERVICE_URL: http://book-service:8000
    depends_on:
      - cart-db
      - book-service

  order-service:
    build: ./order-service
    ports:
      - "8087:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@order-db:5432/order_db
      CART_SERVICE_URL: http://cart-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      RABBITMQ_URL: amqp://bookstore:bookstore123@rabbitmq:5672/
    depends_on:
      - order-db
      - cart-service
      - pay-service
      - ship-service
      - rabbitmq

  ship-service:
    build: ./ship-service
    ports:
      - "8088:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@ship-db:5432/ship_db
    depends_on:
      - ship-db

  pay-service:
    build: ./pay-service
    ports:
      - "8089:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@pay-db:5432/pay_db
    depends_on:
      - pay-db

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8090:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@comment-rate-db:5432/comment_rate_db
      MONGO_URI: mongodb://comment-rate-mongo:27017
      MONGO_DB_NAME: comment_rate_db
      POSTGRES_MIGRATION_URL: postgres://postgres:2604@comment-rate-db:5432/comment_rate_db
    depends_on:
      - comment-rate-mongo
      - comment-rate-db

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8091:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@recommender-db:5432/recommender_db
      ORDER_SERVICE_URL: http://order-service:8000
      BOOK_SERVICE_URL: http://book-service:8000
      REVIEW_SERVICE_URL: http://comment-rate-service:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - recommender-db
      - order-service
      - book-service
      - comment-rate-service

  # ── Message Broker ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bookstore
      RABBITMQ_DEFAULT_PASS: bookstore123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Rate Limiting ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ──────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2604"

  auth-service:
    build: ./auth-service
    ports:
      - "8092:8000"
    environment:
      DATABASE_URL: postgres://postgres:2604@auth-db:5432/auth_db
      JWT_SECRET_KEY: super-secret-jwt-key-change-in-production
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      MANAGER_SERVICE_URL: http://manager-service:8000
    depends_on:
      - auth-db
      - customer-service
  frontend:
    build:
      context: ./frontend-web
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
